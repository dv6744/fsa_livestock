id: 05_fsa_pipeline
namespace: fsa_livestock
description: >
  Full pipeline. Either loads a single species/year/quarter or all combinations,
  then runs dbt transformations.

inputs:
  - id: run_all
    type: BOOLEAN
    displayName: Load all species/years/quarters
    defaults: false

  - id: species
    type: SELECT
    displayName: Select species (ignored if run_all)
    values: [pig, poultry]
    defaults: pig

  - id: year
    type: SELECT
    displayName: Select year 2-digit (ignored if run_all)
    values: ["17", "18", "19", "20"]
    defaults: "18"

  - id: quarter
    type: SELECT
    displayName: Select quarter (ignored if run_all)
    values: ["1", "2", "3", "4"]
    defaults: "2"

tasks:
  - id: load_data
    type: io.kestra.plugin.core.flow.If
    condition: "{{ inputs.run_all }}"
    then:
      - id: each_species_year
        type: io.kestra.plugin.core.flow.ForEach
        concurrencyLimit: 1
        values: ["pig_17", "pig_18", "pig_19", "pig_20", "poultry_17", "poultry_18", "poultry_19", "poultry_20"]
        tasks:
          - id: each_quarter
            type: io.kestra.plugin.core.flow.ForEach
            concurrencyLimit: 1
            values: ["1", "2", "3", "4"]
            tasks:
              - id: 02_gcs_upload
                type: io.kestra.core.tasks.flows.Flow
                namespace: fsa_livestock
                flowId: 02_gcp_gcs
                wait: true
                inputs:
                  species: "{{ parent.taskrun.value | split('_') | first }}"
                  year: "{{ parent.taskrun.value | split('_') | last }}"
                  quarter: "{{ taskrun.value }}"

              - id: 03_bq_load
                type: io.kestra.core.tasks.flows.Flow
                namespace: fsa_livestock
                flowId: 03_gcp_bq
                wait: true
                inputs:
                  species: "{{ parent.taskrun.value | split('_') | first }}"
                  year: "{{ parent.taskrun.value | split('_') | last }}"
                  quarter: "{{ taskrun.value }}"
    else:
      - id: 02_gcs_upload_single
        type: io.kestra.core.tasks.flows.Flow
        namespace: fsa_livestock
        flowId: 02_gcp_gcs
        wait: true
        inputs:
          species: "{{ inputs.species }}"
          year: "{{ inputs.year }}"
          quarter: "{{ inputs.quarter }}"

      - id: 03_bq_load_single
        type: io.kestra.core.tasks.flows.Flow
        namespace: fsa_livestock
        flowId: 03_gcp_bq
        wait: true
        inputs:
          species: "{{ inputs.species }}"
          year: "{{ inputs.year }}"
          quarter: "{{ inputs.quarter }}"

  - id: 04_dbt_run
    type: io.kestra.core.tasks.flows.Flow
    namespace: fsa_livestock
    flowId: 04_gcp_dbt
    wait: true
